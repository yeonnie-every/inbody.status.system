<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IBS – InBody Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --sidebar:#7c2d3e;--sidebar-hover:rgba(255,255,255,.10);--sidebar-active:#fff;--sidebar-text:rgba(255,255,255,.65);--sidebar-text-active:#fff;
  --main:#f4f6fb;--white:#fff;--border:#e4e8f0;--text:#1a1f2e;--text2:#6b7280;
      --blue:#2d6be4;--blue-light:#e8f0fd;--green:#2e7d6e;--green-light:#e0f2ee;
  --orange:#c97a2a;--orange-light:#faebd7;--red:#ef4444;--red-light:#fee2e2;
  --purple:#6d5a9c;--purple-light:#ece8f7;--gray-light:#f3f4f6;
  --shadow:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.10);
  --burg1:#5a1e2b;--burg2:#7c2d3e;--burg3:#9e3a50;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Segoe UI',sans-serif;background:var(--main);color:var(--text);font-size:13px;display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:220px;background:linear-gradient(175deg,var(--burg3) 0%,var(--burg2) 40%,var(--burg1) 100%);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;flex-shrink:0;box-shadow:4px 0 20px rgba(90,30,43,.25)}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo .logo-main{font-size:18px;font-weight:800;color:#fff;letter-spacing:.5px}
.sidebar-logo .logo-main span{color:#2d6be4}
.sidebar-logo .logo-sub{font-size:10px;color:var(--sidebar-text);margin-top:2px;letter-spacing:1px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:14px 16px 6px;font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1.2px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:rgba(255,255,255,.88);font-size:13px;font-weight:600;transition:all .18s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.14);color:#fff}
.nav-item.active{background:rgba(255,255,255,.18);color:#fff;border-left-color:#fff;font-weight:700}
.nav-item .ni{font-size:15px;width:18px;text-align:center}
.sidebar-bottom{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07)}
.user-row{display:flex;align-items:center;gap:9px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-info .uname{font-size:12px;font-weight:600;color:#fff}
.user-info .urole{font-size:11px;color:var(--sidebar-text)}
.sidebar-btns{display:flex;gap:6px;margin-top:10px}
.btn-sb{flex:1;padding:6px;border-radius:7px;border:1px solid rgba(255,255,255,.15);background:none;color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;font-family:inherit;transition:all .18s}
.btn-sb:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── MAIN ── */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:linear-gradient(90deg,var(--burg1) 0%,var(--burg2) 50%,var(--burg3) 100%);border-bottom:none;padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(90,30,43,.30)}
.topbar-title{font-size:16px;font-weight:700;color:#fff}
.topbar-right{display:flex;align-items:center;gap:10px}
.role-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.rb-manager{background:rgba(219,234,254,.9);color:#1d4ed8}
.rb-master{background:rgba(255,243,199,.9);color:#92400e}
.btn-top{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;font-size:12px;cursor:pointer;font-family:inherit;transition:all .18s}
.btn-top:hover{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5)}
.content{padding:24px 28px;flex:1}

/* ── PAGE HEADER ── */
.ph{margin-bottom:20px}
.ph h1{font-size:26px;font-weight:800;color:#7c2d3e;letter-spacing:-.3px}
.ph p{font-size:13px;color:var(--text2);margin-top:3px;font-weight:500}

/* ── WORK TYPE TABS (상단 탭) ── */
.wtype-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px}
.wtype-tab{padding:10px 24px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .18s}
.wtype-tab:hover{color:var(--blue)}
.wtype-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--white);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.si-blue{background:var(--blue-light)}.si-green{background:var(--green-light)}.si-orange{background:var(--orange-light)}.si-gray{background:var(--gray-light)}
.stat-info .sv{font-size:24px;font-weight:700;color:var(--text);line-height:1.1}
.stat-info .sl{font-size:11px;color:var(--text2);margin-top:2px}
.stat-info .sp{font-size:11px;font-weight:600;margin-top:1px}
.sp-blue{color:var(--blue)}.sp-green{color:var(--green)}.sp-orange{color:var(--orange)}

/* ── CARD ── */
.card{background:var(--white);border-radius:12px;box-shadow:var(--shadow);margin-bottom:18px}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-head-title{font-size:14px;font-weight:700;color:var(--text)}
.card-body{padding:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}

/* ── MATRIX TABLE ── */
.matrix-wrap{overflow-x:auto}
table.mx{border-collapse:collapse;width:100%;font-size:12px}
table.mx th{background:#f8fafc;color:var(--text2);font-weight:600;padding:8px 12px;text-align:center;border:1px solid var(--border);white-space:nowrap;font-size:11px;position:sticky;top:0}
table.mx th.part-th{background:#eef2ff;color:var(--blue);font-size:11px;font-weight:700}
table.mx td{border:1px solid var(--border);padding:7px 10px;text-align:center;white-space:nowrap;vertical-align:middle}
table.mx td.prod-td{text-align:left;font-weight:600;background:#fafbfc;position:sticky;left:0;color:var(--text);min-width:130px;font-size:12px}
table.mx td.part-sep{background:#eef2ff;font-weight:700;color:var(--blue);text-align:left;font-size:11px;padding:5px 12px}
table.mx tr:hover td{background:#fafeff}
table.mx tr:hover td.prod-td{background:#f0f4ff}
table.mx tr.hidden-row{opacity:.35}

/* ── BADGES ── */
.sb{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.sb.done{background:var(--gray-light);color:#6b7280}
.sb.inprog{background:var(--green-light);color:#065f46}
.sb.none{background:var(--orange-light);color:#92400e}
.sb.na{background:var(--purple-light);color:#5b21b6}
.date-cell{font-size:11px;color:var(--text2);display:block;margin-top:2px}
.dl-chip{display:inline-block;padding:1px 6px;border-radius:6px;font-size:10px;font-weight:700;margin-top:2px}
.dl-over{background:var(--red-light);color:#991b1b}
.dl-soon{background:var(--orange-light);color:#92400e}
.dl-ok{background:var(--green-light);color:#065f46}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
select.fsel,input.finput{padding:6px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--white);color:var(--text);outline:none;font-family:inherit}
select.fsel:focus,input.finput:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(45,107,228,.1)}

/* ── PROGRESS BAR ── */
.part-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.part-name{width:68px;font-size:12px;font-weight:600;color:var(--text);flex-shrink:0}
.bar-bg{flex:1;background:var(--gray-light);border-radius:99px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:var(--blue);transition:width .6s}
.bar-pct{width:32px;text-align:right;font-size:11px;font-weight:700;color:var(--blue)}

/* ── FEED ── */
.feed-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.feed-item:last-child{border-bottom:none}
.feed-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);margin-top:4px;flex-shrink:0}
.feed-text{font-size:13px;color:var(--text);line-height:1.5}
.feed-time{font-size:11px;color:var(--text2);margin-top:2px}

/* ── PRIORITY ── */
.prio-card{background:var(--white);border-radius:10px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;border-left:3px solid var(--orange);cursor:pointer;transition:box-shadow .18s}
.prio-card:hover{box-shadow:var(--shadow-md)}
.prio-card.overdue{border-color:var(--red)}
.prio-card.ok{border-color:var(--green)}
.prio-meta{flex:1}
.prio-meta .pt{font-weight:700;font-size:13px}
.prio-meta .ps{font-size:12px;color:var(--text2);margin-top:2px}

/* ── ALERT ── */
.alert-bar{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #fcd34d;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.alert-bar .ai{font-size:16px;flex-shrink:0;margin-top:1px}
.alert-bar .at{font-weight:700;font-size:12px;color:#92400e}
.alert-bar .ac{font-size:12px;color:#a16207;margin-top:3px;line-height:1.7}

/* ── SEARCH ── */
.search-wrap{display:flex;gap:10px;margin-bottom:14px}
.search-wrap input{flex:1;padding:9px 16px;border:1px solid var(--border);border-radius:9px;font-size:13px;outline:none;font-family:inherit}
.search-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(45,107,228,.1)}
.result-card{background:var(--white);border-radius:10px;padding:12px 16px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;cursor:pointer;transition:box-shadow .18s}
.result-card:hover{box-shadow:var(--shadow-md)}
.rm .rt{font-weight:700;font-size:13px}.rm .rs{font-size:12px;color:var(--text2);margin-top:2px}

/* ── FORMS ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;font-family:inherit;color:var(--text);background:var(--white)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(45,107,228,.1)}
.form-group textarea{resize:vertical;min-height:68px}
.form-full{grid-column:1/-1}

/* ── BUTTONS ── */
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .18s;font-family:inherit}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:var(--gray-light);color:var(--text)}.btn-secondary:hover{background:#e5e7eb}
.btn-sm{padding:4px 11px;font-size:11px;border-radius:7px;border:none;cursor:pointer;font-weight:600;font-family:inherit}
.btn-edit{background:#dbeafe;color:#1d4ed8}.btn-del{background:#fee2e2;color:#991b1b}.btn-add2{background:#d1fae5;color:#065f46}

/* ── TOGGLE SWITCH ── */
.toggle-switch{position:relative;display:inline-block;width:42px;height:22px;cursor:pointer}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.3s;border-radius:22px}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background-color:white;transition:.3s;border-radius:50%}
input:checked + .toggle-slider{background-color:var(--green)}
input:checked + .toggle-slider:before{transform:translateX(20px)}

/* ── UPLOAD ── */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:28px;text-align:center;cursor:pointer;background:#fafbfc;transition:all .2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:var(--blue-light)}
.upload-zone input[type=file]{display:none}
.uz-icon{font-size:32px;margin-bottom:8px}
.uz-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.uz-sub{font-size:12px;color:var(--text2)}
.progress-bar{height:6px;background:var(--gray-light);border-radius:99px;overflow:hidden;margin-top:10px;display:none}
.progress-fill{height:100%;background:var(--blue);border-radius:99px;transition:width .3s}
.upload-result{border-radius:9px;padding:10px 14px;margin-top:10px;font-size:12px;display:none}
.upload-result.ok{background:var(--green-light);color:#065f46}
.upload-result.err{background:var(--red-light);color:#991b1b}
.preview-wrap{overflow-x:auto;max-height:240px;overflow-y:auto;border-radius:9px;border:1px solid var(--border);margin-top:12px}
.preview-wrap table{border-collapse:collapse;width:100%;font-size:12px}
.preview-wrap th{background:#f8fafc;color:var(--text2);padding:6px 10px;border:1px solid var(--border);font-size:11px;position:sticky;top:0}
.preview-wrap td{padding:6px 10px;border:1px solid var(--border)}
.template-dl{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--blue-light);border-radius:8px;font-size:12px;font-weight:600;color:var(--blue);cursor:pointer;border:none;font-family:inherit;transition:all .18s}
.template-dl:hover{background:#dbeafe}

/* ── TYPE CHIPS ── */
.type-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.type-chip{display:flex;align-items:center;gap:6px;background:var(--blue-light);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--blue)}
.type-chip .xbtn{cursor:pointer;color:var(--red);font-size:14px;line-height:1}
.add-row{display:flex;gap:8px}
.add-row input{flex:1;padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;font-family:inherit}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:600;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:380px;box-shadow:var(--shadow-md)}
.modal h2{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.modal .msub{font-size:13px;color:var(--text2);margin-bottom:20px}
.modal .form-group{margin-bottom:12px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns .btn{flex:1}
.err-msg{color:var(--red);font-size:12px;margin-top:5px;display:none}
.detail-modal{background:#fff;border-radius:16px;padding:26px;width:480px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.detail-modal h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px}
.drow{display:flex;gap:10px;margin-bottom:8px;font-size:13px}
.drow .dk{font-weight:700;width:82px;flex-shrink:0;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.3px;padding-top:1px}
.vtag{background:var(--blue-light);color:var(--blue);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
.divider{height:1px;background:var(--border);margin:14px 0}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1f2e;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .28s;pointer-events:none;box-shadow:var(--shadow-md)}
.toast.show{opacity:1;transform:translateY(0)}
.empty{text-align:center;padding:36px;color:var(--text2);font-size:13px}
code{font-family:'Noto Sans KR','Segoe UI',sans-serif;background:#f1f5f9;padding:1px 6px;border-radius:4px;font-size:12px}
canvas{max-height:200px}

/* ── INITIAL LOGIN SCREEN ── */
#login-screen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--burg1) 0%,var(--burg2) 50%,var(--burg3) 100%)}
#login-screen.hidden{display:none}
.ls-card{background:#fff;border-radius:20px;padding:40px 44px;width:420px;box-shadow:0 24px 64px rgba(90,30,43,.35);position:relative;overflow:hidden}
.ls-card::before{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;background:linear-gradient(135deg,rgba(124,45,62,.08),rgba(45,107,228,.08));border-radius:50%}
.ls-logo{margin-bottom:28px}
.ls-logo .ls-title{font-size:26px;font-weight:900;color:#1a1f2e;letter-spacing:-.5px}
.ls-logo .ls-sub{font-size:12px;color:var(--text2);margin-top:3px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.ls-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:18px}
.role-btn{width:100%;display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:12px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:10px;text-align:left}
.role-btn:hover{border-color:var(--blue);background:var(--blue-light);transform:translateX(4px)}
.role-btn .rb-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rb-user .rb-icon{background:#f3f4f6}
.rb-manager .rb-icon{background:#dbeafe}
.rb-master .rb-icon{background:#fdf2f4}
.role-btn .rb-info .rb-name{font-size:13px;font-weight:700;color:var(--text)}
.role-btn .rb-info .rb-desc{font-size:11px;color:var(--text2);margin-top:2px}
.ls-version{margin-top:20px;text-align:center;font-size:11px;color:#d1d5db}

/* main content blur when not logged in */
.main-blur{filter:blur(4px);pointer-events:none;user-select:none}

/* ── PAGES ── */
.page{display:none}.page.active{display:block}

@media(max-width:900px){
  .sidebar{width:60px}.sidebar-logo .logo-main,.sidebar-logo .logo-sub,.nav-item span,.nav-section,.user-info,.sidebar-btns{display:none}
  .main{margin-left:60px}
  .stats-row{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
